    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-6xl mx-auto">

                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Wealth Growth Calculator</h1>

            </div>
            <!-- Currency Selector -->
            <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 flex items-center gap-3 w-fit">
                <label class="text-sm font-semibold text-slate-700">Currency:</label>
                <select id="currency" class="bg-transparent border-none text-slate-900 font-medium focus:ring-0 cursor-pointer outline-none" onchange="updateCurrency()">
                    <option value="AED" selected>AED (د.إ)</option>
                    <option value="INR">INR (₹)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Inputs Section -->

                    Investment Parameters
                </h2>

                <div class="space-y-5">
                    <!-- Initial Investment -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Initial Investment</label>

                            <input type="number" id="initial" value="4500" class="block w-full pl-12 pr-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors font-medium" oninput="calculate()">
                        </div>
                    </div>

                    <!-- Regular Contribution -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Regular Contribution</label>
                        <div class="flex gap-2">
                            <div class="relative flex-grow">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <span class="currency-label text-slate-400 sm:text-sm font-semibold">AED</span>
                                </div>
                                <input type="number" id="contribution" value="1500" class="block w-full pl-12 pr-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors font-medium" oninput="calculate()">
                            </div>
                            <select id="freq" class="block w-32 pl-3 pr-8 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-white font-medium" onchange="calculate()">
                                <option value="monthly">Monthly</option>
                                <option value="annual">Annually</option>
                            </select>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Total Years</label>
                            <input type="number" id="totalYears" value="15" class="block w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors font-medium" oninput="calculate()">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Stop Investing In</label>
                            <input type="number" id="stopYears" value="10" class="block w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors font-medium" oninput="calculate()">

                        </div>
                    </div>

                    <!-- Expected Return -->
                    <div class="pt-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Expected Annual Return</label>
                        <div class="relative">
                            <input type="number" id="rate" value="12" step="0.1" class="block w-full pl-3 pr-8 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors font-medium text-indigo-700" oninput="calculate()">

                                <span class="text-slate-400 sm:text-sm font-semibold">%</span>
                            </div>

            <!-- Results Section -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-sm">
                        <p class="text-indigo-100 text-sm font-medium mb-1">Total Future Value</p>
                        <h3 class="text-3xl font-bold tracking-tight" id="outTotal">0</h3>
                    </div>
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
                        <p class="text-slate-500 text-sm font-medium mb-1">Total Contributions</p>
                        <h3 class="text-2xl font-bold text-slate-800 tracking-tight" id="outPrincipal">0</h3>
                    </div>
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-sm">
                        <p class="text-slate-500 text-sm font-medium mb-1">Total Returns Earned</p>
                        <h3 class="text-2xl font-bold text-emerald-500 tracking-tight" id="outInterest">0</h3>
                    </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex-grow min-h-[400px] flex flex-col">

                    <div class="relative flex-grow w-full h-full">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

            </div>

    </div>

    <script>

        const currencySymbols = { 'AED': 'AED', 'INR': '₹', 'USD': '$', 'EUR': '€', 'GBP': '£' };
        let currentCurrency = 'AED';

        function updateCurrency() {
            currentCurrency = document.getElementById('currency').value;
            const sym = currencySymbols[currentCurrency];
            
            // Update all small input labels
            document.querySelectorAll('.currency-label').forEach(el => {
                el.innerText = sym;
            });
            
            // Recalculate to update chart and summaries with new symbol
            calculate();
        }

        const formatCurrency = (num) => {
            const sym = currencySymbols[currentCurrency];
            // Format smartly: spacing for text acronyms, attached for symbols (e.g., "AED 5,000" vs "$5,000")
            const separator = (sym.length > 1) ? ' ' : ''; 
            return sym + separator + num.toLocaleString('en-US', { maximumFractionDigits: 0 });

            ],

                "Maths fail tha kya bachpan se? Total duration se lamba contribution kaise chalega meri jaan?",
                "Logic ki toh tune poori dhajjiya uda di. Physics, Math sab ro rahe hain corner mein.",

            ]
        };

        // Helper to grab random roast
        function getRandomRoast(category) {
            const arr = roasts[category];
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function calculate() {
            // Get values
            const initial = parseFloat(document.getElementById('initial').value) || 0;
            const contribution = parseFloat(document.getElementById('contribution').value) || 0;
            const freq = document.getElementById('freq').value;
            const totalYears = parseInt(document.getElementById('totalYears').value) || 0;
            let stopYears = parseInt(document.getElementById('stopYears').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;

            // Enforce constraints & trigger Roasts
            if (rate > 20) {
                triggerMemeMode(getRandomRoast('rate'));
                return;
            }
            if (freq === 'monthly' && contribution > 3000) {
                triggerMemeMode(getRandomRoast('contribution'));
                return;
            }
            if (initial > 5000) {
                triggerMemeMode(getRandomRoast('initial'));
                return;
            }
            if (totalYears > 20) {
                triggerMemeMode(getRandomRoast('years'));
                return;
            }
            // FIX: Stop Investing logic checked logically
            if (stopYears > totalYears) {
                triggerMemeMode(getRandomRoast('stopYears'));
                return;
            }

            let currentBalance = initial;
            let totalContributions = initial;
            const monthlyRate = rate / 100 / 12;

            const labels = [0];
            const principalData = [initial];
            const returnData = [0];
            const balanceData = [initial];

            for (let year = 1; year <= totalYears; year++) {
                for (let month = 1; month <= 12; month++) {
                    
                    // Apply compound growth for the month
                    let monthlyReturn = currentBalance * monthlyRate;
                    currentBalance += monthlyReturn;

                    // Add contributions if we are within the active investing phase
                    if (year <= stopYears) {
                        if (freq === 'monthly') {
                            currentBalance += contribution;
                            totalContributions += contribution;
                        } else if (freq === 'annual' && month === 12) {
                            // Add annual contribution at the end of the year
                            currentBalance += contribution;
                            totalContributions += contribution;
                        }
                    }
                }
                
                // Store year-end data points for the chart
                labels.push(year);
                principalData.push(totalContributions);
                returnData.push(currentBalance - totalContributions);
                balanceData.push(currentBalance);
            }

            // Update UI text
            document.getElementById('outTotal').innerText = formatCurrency(currentBalance);
            document.getElementById('outPrincipal').innerText = formatCurrency(totalContributions);
            document.getElementById('outInterest').innerText = formatCurrency(currentBalance - totalContributions);

            // Update Chart
            renderChart(labels, principalData, returnData);
        }

        function renderChart(labels, principalData, returnData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            if (growthChart) {
                growthChart.destroy();
            }

            growthChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Total Contributions',
                            data: principalData,
                            backgroundColor: '#94a3b8', // slate-400
                            stacked: true,
                            borderRadius: { topLeft: 0, topRight: 0, bottomLeft: 6, bottomRight: 6 }
                        },
                        {
                            label: 'Returns Earned',
                            data: returnData,
                            backgroundColor: '#10b981', // emerald-500
                            stacked: true,
                            borderRadius: { topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0 }
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        const sym = currencySymbols[currentCurrency];
                                        const sep = sym.length > 1 ? ' ' : '';
                                        label += sym + sep + context.parsed.y.toLocaleString('en-US', {maximumFractionDigits: 0});
                                    }
                                    return label;
                                },
                                footer: function(tooltipItems) {
                                    let total = 0;
                                    tooltipItems.forEach(function(tooltipItem) {
                                        total += tooltipItem.parsed.y;
                                    });
                                    const sym = currencySymbols[currentCurrency];
                                    const sep = sym.length > 1 ? ' ' : '';
                                    return 'Total Balance: ' + sym + sep + total.toLocaleString('en-US', {maximumFractionDigits: 0});
                                }
                            }
                        },
                        legend: {
                            position: 'bottom',
                            labels: { usePointStyle: true, padding: 20, font: { family: 'Inter', size: 13 } }
                        }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            title: { display: true, text: 'Years' },
                            grid: { display: false }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    const sym = currencySymbols[currentCurrency];
                                    if (value >= 1000000) return sym + (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return sym + (value / 1000).toFixed(0) + 'k';
                                    return sym + value;
                                },
                                font: { family: 'Inter' }
                            },
                            grid: { color: '#f1f5f9' }
                        }
                    }
                }
            });
        }

        // Run setup and initial calculation on load
        window.onload = () => {
            updateCurrency(); // This will auto-call calculate() too
        };
